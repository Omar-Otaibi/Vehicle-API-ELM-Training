spring.application.name=Vehicle-API
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.hibernate.SQL_BIND_PARAMETERS=TRACE

# MSSQL Connection
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=master;encrypt=true;trustServerCertificate=true
spring.datasource.username=SA
spring.datasource.password=MySecretPass2026
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.max-page-size=10

#Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# JWT Security Key
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=3600000

#FeignClient
logging.level.org.example.vehicleapi.vehicle.integration.MockApiFeignClient=DEBUG
logging.level.feign=DEBUG

#Scheduled Jobs Config
# Runs every day at 2:00 AM
vehicle.jobs.clear-old.cron=0 0 2 * * *
# Runs at the start of every hour
vehicle.jobs.sync.cron=0 0 * * * *